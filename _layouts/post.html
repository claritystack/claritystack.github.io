---
layout: default
---

<style>
  /* POST LAYOUT */
  .main-wrap {
    max-width: 1100px;
    margin: 0 auto 0 120px;
    padding: 48px 48px 80px;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(28px, 4.5vw, 42px);
    font-weight: 700;
    line-height: 1.2;
    color: #1a1a1a;
    margin-bottom: 18px;
    letter-spacing: -0.5px;
  }

  h2 {
    font-family: 'Lora', serif;
    font-size: 23px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 48px 0 16px;
    line-height: 1.25;
    letter-spacing: -0.3px;
  }

  p { margin-bottom: 20px; color: #2d2d2d; }
  hr { border: none; border-top: 1px solid #ddd; margin: 44px 0; }

  /* TOC */
  .toc { border: 1px solid #ddd; border-top: 3px solid #1a1a1a; margin-bottom: 40px; overflow: hidden; }
  .toc-toggle {
    width: 100%; background: none; border: none; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-family: 'Lora', serif; font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: #1a1a1a; text-align: left;
  }
  .toc-toggle:hover { background: #fafafa; }
  .toc-arrow { font-size: 12px; color: #888; transition: transform 0.2s ease; flex-shrink: 0; }
  .toc-toggle[aria-expanded="true"] .toc-arrow { transform: rotate(180deg); }
  .toc-body { display: none; padding: 0 24px 20px; }
  .toc-body.open { display: block; }
  .toc ol { padding-left: 18px; margin: 0; }
  .toc li { font-size: 15px; color: #444; padding: 4px 0; line-height: 1.5; }
  .toc li a { color: #1a1a1a; text-decoration: none; border-bottom: 1px solid #ddd; }
  .toc li a:hover { border-bottom-color: #1a1a1a; }
  .toc ol ol { margin-top: 4px; padding-left: 16px; list-style-type: lower-alpha; }
  .toc ol ol li { font-size: 14px; color: #666; }

  /* COMPARISON TABLE */
  .table-wrap { overflow-x: auto; margin: 20px 0 32px; }
  table.compare { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.compare thead tr { background: #1a1a1a; }
  table.compare th {
    color: #fff; font-size: 12px; font-weight: 600; padding: 10px 14px;
    text-align: left; letter-spacing: 0.04em; text-transform: uppercase;
  }
  table.compare td { padding: 12px 14px; border-bottom: 1px solid #eee; vertical-align: middle; color: #2d2d2d; }
  table.compare tbody tr:last-child td { border-bottom: none; }
  table.compare tbody tr:hover { background: #fafafa; }
  table.compare td a { color: #1a1a1a; font-weight: 600; text-decoration: underline; }

  /* PRODUCT BLOCKS */
  .product-block { border-top: 2px solid #1a1a1a; padding-top: 28px; margin-bottom: 44px; }
  .product-meta { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  h3.product-name { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .product-price { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; color: #1a1a1a; white-space: nowrap; }

  /* SPEC ROW */
  .spec-row {
    display: flex; flex-wrap: wrap; gap: 0;
    border-top: 1px solid #eee; border-left: 1px solid #eee;
    margin-bottom: 20px; font-size: 18px;
  }
  .spec-cell { flex: 1 1 140px; padding: 10px 14px; border-bottom: 1px solid #eee; border-right: 1px solid #eee; }
  .spec-cell .spec-label {
    font-size: 18px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: #999; display: block; margin-bottom: 3px;
  }
  .spec-cell .spec-value { color: #1a1a1a; font-weight: 500; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px 0; }
  .btn-primary {
    display: inline-block; background: #1a1a1a; color: #fff;
    font-weight: 600; font-size: 19px; padding: 11px 22px;
    text-decoration: none; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.8; }

  /* FAQ */
  .faq-item { padding: 18px 0; border-bottom: 1px solid #eee; display: flex; gap: 16px; align-items: flex-start; }
  .faq-item:last-child { border-bottom: none; }
  .faq-num { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; color: #000; flex-shrink: 0; width: 28px; line-height: 1.3; }
  .faq-content h3 { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.35; }
  .faq-content p { font-size: 18px; color: #444; margin-bottom: 0; }

  /* FOOTER DISCLOSURE */
  .disclosure {
    font-size: 13px; color: #999; padding: 20px 24px;
    line-height: 1.6; border-top: 1px solid #eee; display: block;
  }

  @media (max-width: 768px) {
    body { font-size: 16px; }
    h1 { font-size: 26px; }
    h2 { font-size: 22px; }
    h3.product-name { font-size: 20px; }
    .main-wrap { margin: 0; padding: 24px 16px 60px; }
    .spec-row { font-size: 14px; }
    .spec-cell .spec-label { font-size: 11px; }
    .btn-primary { font-size: 15px; }
    .faq-content p { font-size: 15px; }
    .product-price { font-size: 20px; }
  }
</style>

<main class="main-wrap">
  {{ content }}
</main>

<script>
  function toggleTOC(btn) {
    const body = document.getElementById('toc-body');
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open');
    btn.setAttribute('aria-expanded', !isOpen);
  }
</script>
