---
layout: default
---

<style>
  .post-wrap { max-width: 860px; margin: 0 auto; padding: 64px 48px 80px; }
  .post-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 16px; }
  .post-title { font-family: 'Lora', serif; font-size: clamp(28px, 4vw, 48px); font-weight: 700; line-height: 1.15; color: #1a1a1a; letter-spacing: -0.5px; margin-bottom: 16px; }
  .post-meta { font-size: 14px; color: #bbb; margin-bottom: 48px; border-bottom: 1px solid #eee; padding-bottom: 24px; }
  .post-body h2 { font-family: 'Lora', serif; font-size: 26px; font-weight: 700; color: #1a1a1a; margin: 48px 0 16px; line-height: 1.2; }
  .post-body h3 { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; color: #1a1a1a; margin: 32px 0 12px; }
  .post-body p { margin-bottom: 20px; color: #333; }
  .post-body a { color: #1a1a1a; text-decoration: underline; }
  .post-body table { width: 100%; border-collapse: collapse; margin: 32px 0; font-size: 15px; }
  .post-body th { background: #1a1a1a; color: #fff; padding: 12px 16px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; }
  .post-body td { padding: 12px 16px; border-bottom: 1px solid #eee; vertical-align: top; }
  .post-body tr:hover td { background: #fafafa; }
  .post-body ul, .post-body ol { padding-left: 24px; margin-bottom: 20px; }
  .post-body li { margin-bottom: 6px; color: #333; }

  @media (max-width: 900px) {
    .post-wrap { padding: 40px 20px 60px; }
    .post-body table { font-size: 13px; }
    .post-body th, .post-body td { padding: 10px 12px; }
  }
</style>

<div class="post-wrap">
  <p class="post-label">{{ page.category }} · Buying Guide</p>
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">Updated {{ page.updated }}</p>
  <div class="post-body">
    {{ content }}
  </div>
</div>
