<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="144x144" href="/favicon.png">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZP4XP6YHF5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZP4XP6YHF5');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: #fff; color: #1a1a1a; font-size: 18px; line-height: 1.85; }

    /* HEADER */
    .site-header { border-bottom: 2px solid #1a1a1a; padding: 14px 48px; display: flex; align-items: center; justify-content: space-between; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 36px; height: 36px; flex-shrink: 0; }
    .logo-name { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.3px; }

    /* FOOTER */
    .disclosure {
    font-size: 13px;
    color: #999;
    margin-top: 0;
    padding: 20px 24px;
    line-height: 1.6;
    border-top: 1px solid #eee;
    width: 100%;
    text-align: center;
    display: block;
}

footer {
    margin-top: 0;
    font-size: 13px;
    color: #bbb;
    text-align: center;
    padding: 8px;
    width: 100%;
    display: block;
}

    @media (max-width: 900px) {
      .site-header { padding: 14px 20px; }
      .site-footer { flex-direction: column; gap: 16px; padding: 24px 20px; text-align: center; }
      .footer-disclosure { text-align: center; }
    }

    {{ page.custom_css }}
  </style>

  {% if page.custom_head %}{{ page.custom_head }}{% endif %}
</head>
<body>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}

</body>
</html>
